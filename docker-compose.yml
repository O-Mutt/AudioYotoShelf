services:
  bridge:
    build: .
    container_name: audioyotoshelf
    restart: unless-stopped
    ports:
      - "${BRIDGE_PORT:-8080}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__Postgres=Host=postgres;Database=audioyotoshelf;Username=bridge;Password=${DB_PASSWORD:-changeme}
      - ConnectionStrings__Redis=redis:6379
      - Yoto__ClientId=${YOTO_CLIENT_ID}
      - Yoto__ClientSecret=${YOTO_CLIENT_SECRET}
      - Gemini__ApiKey=${GEMINI_API_KEY}
      - Transfer__TempDirectory=/app/temp
    volumes:
      - tempdata:/app/temp
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bridge-net

  postgres:
    image: postgres:17-alpine
    container_name: audioyotoshelf-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: audioyotoshelf
      POSTGRES_USER: bridge
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bridge -d audioyotoshelf"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bridge-net

  redis:
    image: redis:7-alpine
    container_name: audioyotoshelf-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - bridge-net

volumes:
  pgdata:
  redisdata:
  tempdata:

networks:
  bridge-net:
    driver: bridge
